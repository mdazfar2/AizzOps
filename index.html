<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website 2.0 | Under Construction</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 20%, rgba(255, 105, 180, 0.18), transparent 40%),
                        radial-gradient(circle at 80% 15%, rgba(255, 179, 71, 0.18), transparent 38%),
                        radial-gradient(circle at 80% 80%, rgba(0, 190, 255, 0.18), transparent 42%),
                        linear-gradient(135deg, #fdfcfb 0%, #f5f7fa 100%);
            overflow: hidden;
            color: #1f2937;
        }

        /* Container for the Content */
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: fadeIn 1.5s ease-out;
        }

        /* Animation for the whole box */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* The Main Heading with Pulse Effect */
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #ff9f1c, #ffd166, #06b6d4, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Subtext */
        p {
            font-size: 1.2rem;
            color: #475569;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* Progress Bar Animation */
        .loader-bar {
            width: 250px;
            height: 6px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            margin: 0 auto 2rem;
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #ff6b6b, #ff9f1c, #ffd166, #06b6d4, #2563eb);
            border-radius: 10px;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* Thank You Message */
        .thanks {
            font-weight: 600;
            color: #64748b;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Floating background circles for extra 'vibe' */
        .circle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0));
            border-radius: 50%;
            z-index: -1;
            filter: blur(2px);
        }
    </style>
</head>
<body>

    <div class="circle" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
    <div class="circle" style="width: 150px; height: 150px; bottom: 15%; right: 10%;"></div>

    <div class="container">
        <h1>Website 2.0 is Building</h1>
        <p>Something amazing is in the works.<br> 
           Please wait while we craft a brand new experience for you.</p>
        
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>

        <p class="thanks">Thank you for your visit!</p>
    </div>

</body>
</html>
